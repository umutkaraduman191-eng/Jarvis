<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>J.A.R.V.I.S</title><style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{background:#020c14;color:#00d4ff;font-family:'Rajdhani',sans-serif;min-height:100vh;padding:16px;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:40px 40px}.logo{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:8px;text-align:center;text-shadow:0 0 30px rgba(0,212,255,0.9);padding:16px 0 4px}.sub{text-align:center;font-size:9px;letter-spacing:4px;color:rgba(0,212,255,0.4);margin-bottom:12px}.reactor{width:70px;height:70px;margin:0 auto 12px;position:relative;cursor:pointer}.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:#00d4ff;animation:spin 3s linear infinite}.ring2{inset:10px;border-top-color:#ffc107;animation:spin 2s linear infinite reverse}.ring3{inset:20px;border-top-color:#00d4ff;animation:spin 5s linear infinite}.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:radial-gradient(circle,#fff 0%,#00d4ff 40%,transparent 70%);border-radius:50%;box-shadow:0 0 20px #00d4ff,0 0 40px rgba(0,212,255,0.5)}.status{display:flex;justify-content:space-between;padding:7px 12px;border:1px solid rgba(0,212,255,0.2);border-radius:4px;background:rgba(0,212,255,0.03);margin-bottom:10px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px}.dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;display:inline-block;margin-right:6px}.chat{border:1px solid rgba(0,212,255,0.2);border-radius:8px;background:rgba(0,212,255,0.02);padding:12px;min-height:240px;max-height:320px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}.msg{padding:8px 12px;border-radius:4px;font-size:14px;line-height:1.5}.msg.j{border-left:3px solid #00d4ff;background:rgba(0,212,255,0.05);color:rgba(0,212,255,0.9)}.msg.u{border-left:3px solid #ffc107;background:rgba(255,193,7,0.07);color:#ffe082;align-self:flex-end}.msg.e{border-left:3px solid #ff3b30;background:rgba(255,59,48,0.05);color:#ff3b30}.lbl{font-size:8px;letter-spacing:2px;opacity:0.5;font-family:'Orbitron',monospace;display:block;margin-bottom:2px}.quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.qbtn{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.15);color:rgba(0,212,255,0.7);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif}.inp{width:100%;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.25);border-radius:4px;color:#00d4ff;font-family:'Rajdhani',sans-serif;font-size:15px;padding:10px 14px;outline:none;resize:none;min-height:50px;margin-bottom:8px}.row{display:flex;gap:8px}.btn{flex:1;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;border-radius:4px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;padding:10px 4px;cursor:pointer}.btn.r{color:#ff3b30;border-color:rgba(255,59,48,0.3);background:transparent}.btn.act{color:#ff3b30;border-color:#ff3b30;background:rgba(255,59,48,0.1)}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.3);border-radius:2px}</style></head><body>
<div class="logo">J.A.R.V.I.S</div>
<div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
<div class="reactor" onclick="startVoice()">
<div class="ring"></div><div class="ring ring2"></div><div class="ring ring3"></div>
<div class="core" id="core"></div></div>
<div class="status"><div><span class="dot" id="dot"></span><span id="stxt">HAZIR</span></div><span id="clk"></span></div>
<div class="chat" id="chat"><div class="msg j"><span class="lbl">▸ J.A.R.V.I.S</span>Merhaba. Ben J.A.R.V.I.S — yapay zeka destekli kişisel asistanınız. Sizi bekliyordum. Nasıl yardımcı olabilirim?</div></div>
<div class="quick">
<span class="qbtn" onclick="go('Saat kaç?')">⏱ Saat</span>
<span class="qbtn" onclick="go('Bugünün tarihi?')">📅 Tarih</span>
<span class="qbtn" onclick="go('Motivasyon ver')">⚡ Motivasyon</span>
<span class="qbtn" onclick="go('Şaka anlat')">😄 Şaka</span>
<span class="qbtn" onclick="go('İlginç bilgi ver')">🧠 Bilgi</span>
</div>
<textarea class="inp" id="inp" placeholder="Komutunuzu girin..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<div class="row">
<button class="btn" id="vbtn" onclick="startVoice()">🎤 SES</button>
<button class="btn" id="spkbtn" onclick="toggleSpk()">🔊 SES: AÇIK</button>
<button class="btn r" onclick="clearChat()">🗑 TEMİZLE</button>
</div>
<script>
let hist=[],spk=true,rec=null,recOn=false;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('tr-TR')},1000);
function st(t,type){document.getElementById('stxt').textContent=t;const d=document.getElementById('dot');d.style.background=type==='l'?'#ff3b30':type==='t'?'#ffc107':'#00ff88';d.style.boxShadow='0 0 8px '+(type==='l'?'#ff3b30':type==='t'?'#ffc107':'#00ff88')}
function addMsg(who,txt,cls){const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg '+cls;d.innerHTML='<span class="lbl">▸ '+who+'</span>'+txt;c.appendChild(d);c.scrollTop=c.scrollHeight}
async function send(){const t=document.getElementById('inp').value.trim();if(!t)return;document.getElementById('inp').value='';go(t)}
async function go(t){addMsg('SİZ',t,'u');hist.push({role:'user',content:t});st('İŞLİYOR...','t');const now=new Date();try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:'Sen J.A.R.V.I.S, Iron Man filmindeki gibi Türkçe konuşan yapay zeka asistanısın. Kısa öz JARVIS tarzı cevap ver. Şu an: '+now.toLocaleString("tr-TR"),messages:hist})});const d=await r.json();const rep=d.content[0].text;hist.push({role:'assistant',content:rep});addMsg('J.A.R.V.I.S',rep,'j');if(spk)speak(rep);st('HAZIR','i')}catch(e){addMsg('HATA','Bağlantı hatası. Sistem yeniden kalibrasyon yapıyor...','e');st('HATA','l');setTimeout(()=>st('HAZIR','i'),3000)}}
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/<[^>]*>/g,''));u.lang='tr-TR';u.pitch=0.8;u.rate=1;const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('tr'));if(v)u.voice=v;speechSynthesis.speak(u)}
function toggleSpk(){spk=!spk;document.getElementById('spkbtn').textContent='🔊 SES: '+(spk?'AÇIK':'KAPALI');if(!spk)speechSynthesis.cancel()}
function clearChat(){document.getElementById('chat').innerHTML='';hist=[];addMsg('J.A.R.V.I.S','Bellek temizlendi. Yeni görev için hazırım, efendim.','j')}
function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Ses tanıma desteklenmiyor');return}if(recOn){try{rec.stop()}catch(e){}return}rec=new SR();rec.lang='tr-TR';rec.continuous=false;rec.onstart=()=>{recOn=true;st('DİNLİYOR...','l');document.getElementById('vbtn').textContent='⏹ DUR';document.getElementById('vbtn').className='btn act';document.getElementById('core').style.background='radial-gradient(circle,#fff 0%,#ff3b30 40%,transparent 70%)';document.getElementById('core').style.boxShadow='0 0 25px #ff3b30'};rec.onresult=e=>{document.getElementById('inp').value=e.results[0][0].transcript};rec.onend=()=>{recOn=false;document.getElementById('vbtn').textContent='🎤 SES';document.getElementById('vbtn').className='btn';document.getElementById('core').style.background='';document.getElementById('core').style.boxShadow='';st('HAZIR','i');const t=document.getElementById('inp').value.trim();if(t)go(t)};rec.onerror=()=>{recOn=false;st('HAZIR','i');document.getElementById('vbtn').textContent='🎤 SES';document.getElementById('vbtn').className='btn'};try{rec.start()}catch(e){recOn=false}}
speechSynthesis.getVoices();
</script></body></html>
