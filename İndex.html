<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
</head>
<body style="background:#020c14;color:#00d4ff;font-family:sans-serif;margin:0;padding:16px;min-height:100vh">
<h1 style="text-align:center;letter-spacing:8px;font-size:24px;text-shadow:0 0 20px #00d4ff">J.A.R.V.I.S</h1>
<p style="text-align:center;font-size:10px;letter-spacing:3px;opacity:0.5">JUST A RATHER VERY INTELLIGENT SYSTEM</p>
<div id="chat" style="border:1px solid rgba(0,212,255,0.3);border-radius:8px;padding:12px;min-height:200px;max-height:350px;overflow-y:auto;margin:16px 0;background:rgba(0,212,255,0.03)">
<div style="color:rgba(0,212,255,0.8);border-left:3px solid #00d4ff;padding:8px 12px;margin-bottom:8px">Merhaba. Ben J.A.R.V.I.S. Nasıl yardımcı olabilirim?</div>
</div>
<textarea id="inp" placeholder="Komutunuzu yazın..." style="width:100%;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;padding:10px;border-radius:4px;font-size:15px;box-sizing:border-box;min-height:60px"></textarea>
<div style="display:flex;gap:8px;margin-top:8px">
<button onclick="send()" style="flex:1;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;padding:12px;border-radius:4px;font-size:14px;cursor:pointer">GÖNDER</button>
<button onclick="startVoice()" id="vbtn" style="flex:1;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;padding:12px;border-radius:4px;font-size:14px;cursor:pointer">🎤 SES</button>
</div>
<script>
let hist=[];
async function send(){
  const t=document.getElementById('inp').value.trim();
  if(!t)return;
  document.getElementById('inp').value='';
  addMsg('SİZ',t,'#ffc107','rgba(255,193,7,0.1)');
  const now=new Date();
  hist.push({role:'user',content:t});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:'Sen JARVIS, Iron Man filmindeki gibi Türkçe konuşan yapay zeka asistanısın. Kısa, öz ve JARVIS tarzı cevap ver. Şu an: '+now.toLocaleString("tr-TR"),messages:hist})});
    const d=await r.json();
    const reply=d.content[0].text;
    hist.push({role:'assistant',content:reply});
    addMsg('J.A.R.V.I.S',reply,'#00d4ff','rgba(0,212,255,0.05)');
    speak(reply);
  }catch(e){addMsg('HATA','Bağlantı hatası.','#ff3b30','rgba(255,59,48,0.05)');}
}
function addMsg(who,txt,c,bg){
  const d=document.getElementById('chat');
  d.innerHTML+=`<div style="border-left:3px solid ${c};padding:8px 12px;margin-bottom:8px;background:${bg};color:${c}"><small style="opacity:0.6;font-size:10px">▸ ${who}</small><br>${txt}</div>`;
  d.scrollTop=d.scrollHeight;
}
function speak(t){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(t);
  u.lang='tr-TR';u.pitch=0.8;u.rate=1;
  const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('tr'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Ses tanıma desteklenmiyor');return;}
  const r=new SR();r.lang='tr-TR';r.continuous=false;
  document.getElementById('vbtn').textContent='⏹ DİNLİYOR...';
  document.getElementById('vbtn').style.color='#ff3b30';
  r.onresult=e=>{document.getElementById('inp').value=e.results[0][0].transcript;send();};
  r.onend=()=>{document.getElementById('vbtn').textContent='🎤 SES';document.getElementById('vbtn').style.color='#00d4ff';};
  r.start();
}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
speechSynthesis.getVoices();
</script>
</body>
</html>
